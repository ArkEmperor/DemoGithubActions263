name: Thử nghiệm đọc File README #HEllo
on:
  push:
    branches:
      - main # (hoặc nhánh master tùy repo của bạn)

jobs:
  thuc_hanh_doc_file:
    runs-on: ubuntu-latest #Mượn máy ảo Ubuntu của GitHub để chạy

    steps:
      - name: Bước 1 - Xin chào
        run: echo "Hello HUTECH!" #Lệnh in ra màn hình

      - name: Bước 2 - Tải code
        uses: actions/checkout@v6 #Robot tự động copy code vào máy ảo

      - name: Bước 3 - Đọc file
        run: cat README.md #Mở nội dung file README.md để xem


      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="arkemperor/java-app-compose"
          CONTAINER_PORT=8080
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
