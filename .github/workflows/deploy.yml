name: Deploy to Docker Hub

on:
  push:
    branches:
      - main # Khi đẩy code lên nhánh main thì kịch bản này sẽ chạy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # --- ROBOT 1: Lấy code của bạn từ GitHub về máy ảo ---
      - name: Checkout code
        uses: actions/checkout@v4

      # --- ROBOT 2: Đăng nhập vào Docker Hub (Dùng Secret đã lưu ở Bước 2) ---
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- ROBOT 3: Đóng gói code thành Image và đẩy lên Docker Hub ---
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # CHỖ NÀY CẦN SỬA: Thay "tencuaban" thành đúng tên tài khoản Docker Hub của bạn
          tags: |
            tencuaban/bai-tap-java:latest
            tencuaban/bai-tap-java:${{ github.sha }}